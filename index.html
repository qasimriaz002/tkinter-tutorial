<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- Google tag (gtag.js) -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-122N63D542"></script>
    <script>
          window.dataLayer = window.dataLayer || [];
          function gtag(){dataLayer.push(arguments);}
          gtag('js', new Date());
          gtag('config', 'G-122N63D542');
    </script>
    <title>Tkinter-Tutorial</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body data-theme="light">

    <div class="progress-container">
        <div class="progress-bar" id="progressBar"></div>
    </div>

    <header>
        <div class="logo">
            <img src="assets/icons/favicon.png" alt="Logo">
            Tkinter Tutorial by M. Qasim Riaz
        </div>
        <div class="controls-top">
            <button class="theme-toggle" onclick="toggleTheme()" title="Toggle Dark Mode">◑</button>
            <button class="drawer-toggle" id="drawerToggle" onclick="toggleDrawer()" title="Slide Index" aria-label="Open slide navigation">
                <span></span><span></span><span></span>
            </button>
        </div>
    </header>

    <main id="mainContainer">
        <div class="slides-wrapper">
            <!-- SLIDES WILL BE LOADED HERE DYNAMICALLY BY navigation.js -->
        </div>
    </main>

    <footer>
        <button class="nav-btn" id="prevBtn" onclick="changeSlide(-1)">← Previous</button>
        <span class="slide-counter" id="slideCounter">Loading...</span>
        <button class="nav-btn" id="nextBtn" onclick="changeSlide(1)">Next →</button>
    </footer>

    <!-- Modal Dialog -->
    <div class="modal-overlay" id="modalOverlay">
        <div class="modal">
            <div class="modal-header">
                <span id="mIcon">ℹ️</span>
                <span id="mTitle">Title</span>
            </div>
            <div class="modal-body" id="mMsg">Message</div>
            <div class="modal-footer">
                <button class="tk-btn" onclick="closeModal()">OK</button>
            </div>
        </div>
    </div>

    <!-- Navigation Drawer Overlay -->
    <div class="drawer-overlay" id="drawerOverlay" onclick="closeDrawer()"></div>

    <!-- Navigation Drawer -->
    <nav class="drawer" id="drawer" aria-label="Slide navigation">
        <div class="drawer-header">
            <h3>📚 Slide Index</h3>
            <img src="https://visitor-badge.laobi.icu/badge?page_id=qasimriaz002.tkinter-tutorial" alt="visitors"/>
            <button class="drawer-close" onclick="closeDrawer()" aria-label="Close">✕</button>
        </div>
        <div class="drawer-list" id="drawerList">
            <!-- Populated by navigation.js -->
        </div>
    </nav>

    <!-- Scripts -->
    <script src="js/navigation.js" defer></script>
    <script src="js/demos.js"></script>
</body>
</html>
